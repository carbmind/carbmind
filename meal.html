<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كارب الوجبة | CarbMind</title>

  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:Tajawal,sans-serif;
      background:#f4f3f9;
      color:#1e2432;
    }

    .container{
      width:90%;
      max-width:720px;
      margin:auto;
      padding:40px 0 70px;
    }

    .header{
      text-align:center;
      margin-bottom:36px;
    }

    .header h1{
      font-family:Alexandria,sans-serif;
      font-size:36px;
      margin:0 0 10px;
    }

    .header p{
      color:#6d7385;
      font-size:18px;
      line-height:1.8;
      margin:0;
    }

    .card{
      background:#fff;
      border-radius:22px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.05);
      margin-bottom:22px;
    }

    label{
      display:block;
      font-weight:700;
      margin-bottom:10px;
      font-size:18px;
    }

    select,input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #e4e4ef;
      font-size:18px;
      margin-bottom:18px;
      background:#fff;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#7b6ef6;
      color:#fff;
      font-size:20px;
      font-weight:700;
      cursor:pointer;
    }

    button:hover{
      opacity:.92;
    }

    .result{
      margin-top:18px;
      background:#f6f5ff;
      border-radius:14px;
      padding:18px;
      display:none;
    }

    .result strong{
      display:block;
      font-size:22px;
      margin-bottom:8px;
    }

    .result p{
      margin:0;
      color:#5e6780;
      font-size:18px;
      line-height:1.8;
    }

    .helper{
      margin-top:12px;
      color:#7d869d;
      font-size:16px;
      line-height:1.8;
      text-align:center;
    }

    .back{
      display:block;
      text-align:center;
      margin-top:26px;
      color:#7b6ef6;
      text-decoration:none;
      font-weight:700;
      font-size:18px;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>كارب الوجبة</h1>
      <p>
        اختر نوع الأكل والكمية، وخلّنا نحسب لك الكارب بشكل أسرع وأوضح.
      </p>
    </div>

    <div class="card">

      <label>وش الوجبة أو الصنف؟</label>
      <select id="food">
        <option value="">اختر الصنف</option>
        <option value="bread">خبز</option>
        <option value="rice">رز مطبوخ</option>
        <option value="apple">تفاح</option>
        <option value="milk">حليب</option>
        <option value="dates">تمر</option>
        <option value="banana">موز</option>
      </select>

      <label>الكمية</label>
      <input id="amount" type="number" placeholder="مثال: 2">

      <button onclick="calculateMeal()">احسب الكارب</button>

      <div class="result" id="resultBox">
        <strong id="resultTitle"></strong>
        <p id="resultText"></p>
      </div>

      <div class="helper">
        هذه أرقام تقريبية تساعدك في البداية، وليست بديلًا عن الخطة العلاجية المعتمدة لكم.
      </div>

    </div>

    <a class="back" href="index.html">العودة للصفحة الرئيسية</a>

  </div>

  <script>
    const foods = {
      bread: 15,
      rice: 22,
      apple: 15,
      milk: 12,
      dates: 6,
      banana: 27
    };

    const foodNames = {
      bread: "الخبز",
      rice: "الرز المطبوخ",
      apple: "التفاح",
      milk: "الحليب",
      dates: "التمر",
      banana: "الموز"
    };

    function calculateMeal(){
      const food = document.getElementById("food").value;
      const amount = parseFloat(document.getElementById("amount").value);
      const box = document.getElementById("resultBox");
      const title = document.getElementById("resultTitle");
      const text = document.getElementById("resultText");

      if(food === "" || isNaN(amount) || amount <= 0){
        alert("اختر الصنف وأدخل الكمية أولاً");
        return;
      }

      const carbs = foods[food] * amount;

      box.style.display = "block";
      title.textContent = "الكارب التقريبي: " + carbs.toFixed(1) + " غرام";
      text.textContent = "تم الحساب بناءً على " + amount + " من " + foodNames[food] + ".";
    }
  </script>

</body>
</html>
