<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معامل الكارب | CarbMind</title>

<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Tajawal;
background:#f4f3f9;
color:#1e2432;
}

.container{
width:90%;
max-width:700px;
margin:auto;
padding:40px 0;
}

.header{
text-align:center;
margin-bottom:40px;
}

.header h1{
font-family:Alexandria;
font-size:36px;
margin:0 0 10px;
}

.header p{
color:#6d7385;
font-size:18px;
line-height:1.8;
}

.card{
background:white;
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
margin-bottom:25px;
}

label{
display:block;
margin-bottom:8px;
font-weight:700;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #e4e4ef;
font-size:18px;
margin-bottom:18px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#7b6ef6;
color:white;
font-size:20px;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.result{
margin-top:20px;
background:#f6f5ff;
padding:20px;
border-radius:14px;
text-align:center;
font-size:22px;
font-weight:700;
display:none;
}

.back{
display:block;
text-align:center;
margin-top:30px;
color:#7b6ef6;
text-decoration:none;
font-weight:700;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>معامل الكارب</h1>

<p>
خلّنا نحسب الجرعة بسهولة.<br>
اكتب كمية الكارب ومعاملك ونطلع الجرعة.
</p>

</div>

<div class="card">

<label>كم غرام الكارب في الوجبة؟</label>
<input id="carbs" type="number" placeholder="مثال: 45">

<label>معامل الكارب (كم غرام لكل وحدة)</label>
<input id="ratio" type="number" placeholder="مثال: 10">

<button onclick="calculate()">احسب الجرعة</button>

<div class="result" id="result"></div>

</div>

<a class="back" href="index.html">
العودة للصفحة الرئيسية
</a>

</div>

<script>

function calculate(){

let carbs = document.getElementById("carbs").value;
let ratio = document.getElementById("ratio").value;

if(carbs == "" || ratio == ""){

alert("أدخل القيم أولاً");
return;

}

let dose = carbs / ratio;

dose = dose.toFixed(1);

let resultBox = document.getElementById("result");

resultBox.style.display = "block";

resultBox.innerHTML = "الجرعة التقريبية: " + dose + " وحدة";

}

</script>

</body>
</html>
