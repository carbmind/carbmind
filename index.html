<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CarbMind</title>

<style>

body{

margin:0;
font-family:system-ui;
background:#F3F8F6;
color:#1F2D2A;

}

.container{

width:90%;
max-width:1100px;
margin:auto;

}

header{

padding:25px 0;
display:flex;
justify-content:center;

}

.logo{

background:white;
padding:10px 20px;
border-radius:40px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);

font-weight:700;

}

.hero{

text-align:center;
padding:40px 0;

}

.hero h1{

font-size:44px;
margin:0;

color:#0F2A5C;

}

.hero p{

font-size:20px;
margin-top:15px;
color:#5F7D76;

}

.main{

display:grid;
grid-template-columns:1fr 1fr;
gap:30px;

margin-top:40px;

}

.card{

background:linear-gradient(135deg,#0F6B4E,#1E8F6B);

color:white;

border-radius:25px;

padding:30px;

box-shadow:0 20px 40px rgba(0,0,0,0.15);

}

.card h2{

margin:0;
font-size:36px;

}

.card p{

margin-top:10px;
font-size:18px;

}

.form{

background:white;
padding:30px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

}

input,select{

width:100%;
padding:14px;
margin-top:10px;

border-radius:10px;
border:1px solid #DCEBE4;

}

button{

margin-top:15px;

padding:14px;

border:none;

border-radius:12px;

background:#1E8F6B;
color:white;

font-size:16px;

cursor:pointer;

}

.tools{

margin-top:50px;

display:grid;
grid-template-columns:repeat(4,1fr);

gap:20px;

}

.tool{

background:white;
padding:20px;

border-radius:16px;

box-shadow:0 10px 20px rgba(0,0,0,0.08);

text-align:center;

}

@media(max-width:900px){

.main{

grid-template-columns:1fr;

}

.tools{

grid-template-columns:1fr 1fr;

}

}

</style>

</head>


<body>

<div class="container">

<header>

<div class="logo">

🌾 CarbMind

</div>

</header>

<section class="hero">

<h1>

نرتّب السكري سوا

</h1>

<p>

واجهة هادئة تساعدكم تفهمون القراءة والكارب بطريقة أبسط

</p>

</section>


<section class="main">

<div class="card">

<h2>

سلمان

</h2>

<p>

آخر قراءة: 136 mg/dL

</p>

<p>

الحالة: مستقرة

</p>

<p>

معامل الكارب: 1 : 12

</p>

</div>


<div class="form">

<label>اسم المريض</label>

<input placeholder="اكتب الاسم">

<label>آخر قراءة سكر</label>

<input placeholder="مثال 140">

<label>الحالة</label>

<select>

<option>مستقر</option>
<option>مرتفع</option>
<option>منخفض</option>

</select>

<button>

تحديث البيانات

</button>

</div>

</section>


<section class="tools">

<div class="tool">

📊 السكري وأرقامه

</div>

<div class="tool">

🧮 معامل الكارب

</div>

<div class="tool">

🍽️ حساب كارب الوجبة

</div>

<div class="tool">

📂 ملفات مفيدة

</div>

</section>


</div>

</body>

</html>
