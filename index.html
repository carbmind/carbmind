<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CarbMind</title>

<style>

:root{

--green-main:#1E8F6B;
--green-dark:#0F6B4E;
--green-soft:#A8D7C4;

--bg:#F3F8F6;
--text:#1F2D2A;

}

body{

margin:0;
font-family: system-ui;
background: var(--bg);

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.card{

background:white;

width:90%;
max-width:700px;

padding:40px;

border-radius:24px;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

text-align:center;

}

h1{

color:var(--green-dark);
font-size:36px;

}

p{

color:#5F7D76;
font-size:18px;

}

button{

background:var(--green-main);

color:white;

border:none;

padding:14px 20px;

border-radius:14px;

font-size:16px;

margin-top:20px;

cursor:pointer;

}

button:hover{

background:var(--green-dark);

}

</style>

</head>


<body>

<div class="card">

<h1>CarbMind</h1>

<p>

واجهة البداية لمشروع كارب مايند

</p>

<button>

ابدأ

</button>

</div>

</body>

</html>
